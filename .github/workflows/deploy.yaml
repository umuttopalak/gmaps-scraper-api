name: Deploy Scraper GeoLocalRank

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scraper-geolocalrank:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/scraper-geolocalrank:latest

      - name: Update Kubernetes manifest
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git clone https://${{ secrets.GH_PAT }}@github.com/${{ secrets.K8S_REPO }}.git k8s-repo
          cd k8s-repo

          sed -i "s|image: .*/scraper-geolocalrank:.*|image: ${{ secrets.DOCKER_USERNAME }}/scraper-geolocalrank:${{ github.sha }}|" scraper/deployment.yaml

          cat scraper/deployment.yaml | grep image

          git add scraper/deployment.yaml
          git commit -m "Update scraper-geolocalrank image to ${{ github.sha }}"
          git push
